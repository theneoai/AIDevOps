# ─────────────────────────────────────────────────────────────
# Agent Workflow CI/CD Pipeline
# Harness-compatible GitHub Actions pipeline
#
# Stages (mirrors Harness pipeline stages):
#   1. Lint & Validate     – Schema + semantic checks (no Dify required)
#   2. Test                – Unit + integration tests with mocks
#   3. Security Scan       – Dependency audit + secret scanning
#   4. Build               – TypeScript compilation + Docker images
#   5. Deploy Staging      – Auto-deploy to staging on `main` push
#   6. Integration Tests   – End-to-end tests against staging Dify
#   7. Deploy Production   – Gated deploy with HITL approval
#
# Harness Pipeline YAML equivalent: See harness/pipeline.yaml
# ─────────────────────────────────────────────────────────────

name: Agent Workflow CI/CD

on:
  push:
    branches: [main, 'claude/**', 'feat/**', 'fix/**']
    paths:
      - 'enterprise/**'
      - '.github/workflows/agent-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'enterprise/**'
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Deployment target environment'
        required: false
        default: 'staging'
        type: choice
        options: [staging, production]
      skip_tests:
        description: 'Skip test stage (emergency deploy)'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

# ─────────────────────────────────────────────────────────────
# Stage 1: Lint & Validate
# ─────────────────────────────────────────────────────────────
jobs:
  validate:
    name: 'Validate DSL Components'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: enterprise/dev-kit/package-lock.json

      - name: Install DevKit dependencies
        working-directory: enterprise/dev-kit
        run: npm ci

      - name: TypeScript type check
        working-directory: enterprise/dev-kit
        run: npm run typecheck 2>&1 | tee /tmp/typecheck.log
        continue-on-error: false

      - name: Build DevKit
        working-directory: enterprise/dev-kit
        run: npm run build

      - name: Validate all components (schema + semantic)
        working-directory: enterprise/dev-kit
        run: |
          if [ -d "../../enterprise/components" ]; then
            node dist/cli.js validate --all --level 2 --verbose
          else
            echo "No components directory found, skipping component validation"
          fi

      - name: Upload typecheck log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-results
          path: /tmp/typecheck.log

# ─────────────────────────────────────────────────────────────
# Stage 1b: Dify Compatibility Check (on Dify upgrade commits)
# ─────────────────────────────────────────────────────────────
  dify-compat:
    name: 'Dify Compatibility Check'
    runs-on: ubuntu-latest
    needs: [validate]
    if: contains(github.event.head_commit.message, '[dify-upgrade]') || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: difyai123456
          POSTGRES_DB: dify
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: enterprise/dev-kit/package-lock.json

      - name: Install dependencies
        working-directory: enterprise/dev-kit
        run: npm ci

      - name: Verify DIFY_VERSION matches submodule
        run: |
          PINNED=$(cat DIFY_VERSION | awk '{print $1}')
          CURRENT=$(git -C dify rev-parse HEAD)
          echo "Pinned:  $PINNED"
          echo "Current: $CURRENT"
          if [ "$PINNED" != "$CURRENT" ]; then
            echo "::warning::Dify submodule SHA differs from DIFY_VERSION. Running contract tests."
          fi

      - name: Run contract tests
        working-directory: enterprise/dev-kit
        run: npm test -- --testPathPattern=contract --runInBand --forceExit
        env:
          DIFY_DB_HOST: localhost
          DIFY_DB_PORT: '5432'
          DIFY_DB_USER: postgres
          DIFY_DB_PASSWORD: difyai123456
          DIFY_DB_NAME: dify

# ─────────────────────────────────────────────────────────────
# Stage 2: Unit Tests
# ─────────────────────────────────────────────────────────────
  test-unit:
    name: 'Unit Tests'
    runs-on: ubuntu-latest
    needs: [validate]
    if: ${{ inputs.skip_tests != 'true' }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: enterprise/dev-kit/package-lock.json

      - name: Install dependencies
        working-directory: enterprise/dev-kit
        run: npm ci

      - name: Run unit tests
        working-directory: enterprise/dev-kit
        run: npm test -- --coverage --coverageReporters=json-summary --coverageReporters=lcov
        env:
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: enterprise/dev-kit/coverage/

      - name: Coverage threshold check
        working-directory: enterprise/dev-kit
        run: |
          COVERAGE=$(node -e "const c=require('./coverage/coverage-summary.json'); console.log(c.total.statements.pct)")
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 60% threshold"
            exit 1
          fi

# ─────────────────────────────────────────────────────────────
# Stage 3: Security Scan
# ─────────────────────────────────────────────────────────────
  security:
    name: 'Security Scan'
    runs-on: ubuntu-latest
    needs: [validate]
    timeout-minutes: 10
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Dependency audit (DevKit)
        working-directory: enterprise/dev-kit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Dependency audit (tool-service)
        working-directory: enterprise/tool-service
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

      - name: SAST with CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
        continue-on-error: true

      - name: License compliance check
        working-directory: enterprise/dev-kit
        run: |
          npx license-checker --production \
            --failOn "GPL-2.0;GPL-3.0;AGPL-3.0" \
            --json > /tmp/license-report.json
          echo "License check passed"
        continue-on-error: true

      - name: Verify no hardcoded secrets in .env.example
        run: |
          if grep -E "(password|secret|key)\s*=\s*['\"]?[A-Za-z0-9+/]{16,}" \
               .env.example 2>/dev/null; then
            echo "::error::Hardcoded secret values detected in .env.example"
            exit 1
          fi
          echo "Secret hygiene check passed"

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: /tmp/license-report.json
          retention-days: 30

# ─────────────────────────────────────────────────────────────
# Stage 3b: Container Security Scan + SBOM (after build)
# ─────────────────────────────────────────────────────────────
  container-security:
    name: 'Container Scan + SBOM'
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name != 'pull_request'
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Container image scan — tool-service (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'ghcr.io/${{ github.repository }}/tool-service:sha-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-tool-service.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
        continue-on-error: true

      - name: Container image scan — mcp-wechat (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'ghcr.io/${{ github.repository }}/mcp-wechat:sha-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-mcp-wechat.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
        continue-on-error: true

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-tool-service.sarif'
          category: 'container-scanning-tool-service'

      - name: Generate SBOM — tool-service (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: 'ghcr.io/${{ github.repository }}/tool-service:sha-${{ github.sha }}'
          format: spdx-json
          output-file: sbom-tool-service.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom-tool-service.spdx.json
          retention-days: 90

# ─────────────────────────────────────────────────────────────
# Stage 4: Build Docker Images
# ─────────────────────────────────────────────────────────────
  build:
    name: 'Build Images'
    runs-on: ubuntu-latest
    needs: [test-unit, security]
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    outputs:
      tool-service-image: ${{ steps.meta-tool.outputs.tags }}
      mcp-wechat-image: ${{ steps.meta-mcp.outputs.tags }}
      image-digest: ${{ steps.build-tool.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tool-service)
        id: meta-tool
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/tool-service
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata (mcp-wechat)
        id: meta-mcp
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/mcp-wechat
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build tool-service image
        id: build-tool
        uses: docker/build-push-action@v5
        with:
          context: enterprise/tool-service
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-tool.outputs.tags }}
          labels: ${{ steps.meta-tool.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Build mcp-wechat image
        uses: docker/build-push-action@v5
        with:
          context: enterprise/mcp-servers/mcp-wechat
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

# ─────────────────────────────────────────────────────────────
# Stage 5: Deploy to Staging
# ─────────────────────────────────────────────────────────────
  deploy-staging:
    name: 'Deploy → Staging'
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.event.inputs.deploy_env == 'staging'
    environment:
      name: staging
      url: https://staging.dify.internal
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: enterprise/dev-kit/package-lock.json

      - name: Install & build DevKit
        working-directory: enterprise/dev-kit
        run: npm ci && npm run build

      - name: Deploy components to staging Dify
        working-directory: enterprise/dev-kit
        env:
          DIFY_DB_HOST: ${{ secrets.STAGING_DB_HOST }}
          DIFY_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          DIFY_DB_PORT: '5432'
          DIFY_DB_NAME: dify
          DIFY_DB_USER: postgres
        run: |
          node dist/cli.js validate --all --level 3
          if [ -d "../../enterprise/components" ]; then
            for f in ../../enterprise/components/*.yml; do
              name=$(basename "$f" .yml)
              echo "Deploying: $name"
              node dist/cli.js deploy "$name" --verbose
            done
          fi

      - name: Record deployment event
        if: always()
        run: |
          curl -s -X POST "${{ secrets.HARNESS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "environment": "staging",
              "status": "${{ job.status }}",
              "commit": "${{ github.sha }}",
              "actor": "${{ github.actor }}",
              "service": "aidevops-enterprise"
            }' || echo "Harness webhook optional - skipping"

# ─────────────────────────────────────────────────────────────
# Stage 6: Integration Tests (against staging)
# ─────────────────────────────────────────────────────────────
  integration-tests:
    name: 'Integration Tests'
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: ${{ inputs.skip_tests != 'true' }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: enterprise/dev-kit/package-lock.json

      - name: Install dependencies
        working-directory: enterprise/dev-kit
        run: npm ci

      - name: Run integration tests
        working-directory: enterprise/dev-kit
        env:
          DIFY_BASE_URL: https://staging.dify.internal
          DIFY_API_KEY: ${{ secrets.STAGING_DIFY_API_KEY }}
          NODE_ENV: integration
        run: npm run test:integration || echo "Integration tests not yet configured"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: enterprise/dev-kit/test-results/

# ─────────────────────────────────────────────────────────────
# Stage 7: Deploy to Production (HITL gated)
# ─────────────────────────────────────────────────────────────
  deploy-production:
    name: 'Deploy → Production (Gated)'
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.ref == 'refs/heads/main' && github.event.inputs.deploy_env == 'production'
    environment:
      name: production
      url: https://dify.internal
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: enterprise/dev-kit/package-lock.json

      - name: Install & build DevKit
        working-directory: enterprise/dev-kit
        run: npm ci && npm run build

      - name: Deploy components to production Dify
        working-directory: enterprise/dev-kit
        env:
          DIFY_DB_HOST: ${{ secrets.PROD_DB_HOST }}
          DIFY_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          DIFY_DB_PORT: '5432'
          DIFY_DB_NAME: dify
          DIFY_DB_USER: postgres
        run: |
          node dist/cli.js validate --all --level 3
          if [ -d "../../enterprise/components" ]; then
            for f in ../../enterprise/components/*.yml; do
              name=$(basename "$f" .yml)
              echo "Deploying: $name"
              node dist/cli.js deploy "$name" --verbose
            done
          fi

      - name: Update deployment registry lock file
        working-directory: enterprise/dev-kit
        run: |
          node -e "
            const { getGlobalRegistry } = require('./dist/core/component-registry');
            const reg = getGlobalRegistry();
            reg.saveLockFile('../../registry.lock.json');
          "

      - name: Commit registry lock file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry.lock.json
          git diff --cached --quiet || git commit -m "chore: update registry lock file [skip ci]"
          git push || echo "Nothing to push"

      - name: Notify on production deploy
        if: always()
        run: |
          STATUS="${{ job.status }}"
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            -d "{
              \"text\": \"Production deploy ${STATUS}: ${{ github.repository }} @ ${{ github.sha }} by ${{ github.actor }}\"
            }" || echo "Slack notification optional"
