# ==================================================================
# P4-1 本地开发栈（Ollama 本地 LLM + 热重载支持）
# 用法: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# 或:   make dev-up
# ==================================================================

version: "3.8"

services:
  # ─── Ollama：本地 LLM，替代 OpenAI，CI/开发零成本 ───
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - dify-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── DevKit with hot reload ───
  devkit-dev:
    build:
      context: ./enterprise/dev-kit
      target: development
    container_name: dify-devkit-dev
    volumes:
      - ./enterprise/dev-kit/src:/app/src:ro
      - ./enterprise/components:/app/components
    environment:
      - DIFY_BASE_URL=${DIFY_BASE_URL:-http://nginx/v1}
      - DIFY_API_KEY=${DIFY_API_KEY:-}
      - USE_LOCAL_LLM=true
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse-server:3000}
    networks:
      - dify-network
    profiles:
      - dev
    command: ["watch", "--verbose"]

volumes:
  ollama_data:
