# ==================================================================
# Dify + Enterprise Agent Framework 统一编排
# ==================================================================
# 使用方式:
#   1. 克隆 Dify 官方仓库到 dify/ 目录（或独立部署）
#   2. 确保 Dify 使用网络 dify-network
#   3. 运行: docker-compose up -d
#
# 注意: Dify 官方服务通过 Docker Compose include 导入
# ==================================================================

version: "3.8"

services:
  # ─── 企业自研: 通用 Tool 服务 ───
  enterprise-tool-service:
    build:
      context: ./enterprise/tool-service
    container_name: enterprise-tool-service
    ports:
      - "3100:3000"
    environment:
      - SERVICE_PORT=3000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - dify-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── 企业自研: 微信公众号 MCP ───
  mcp-wechat:
    build:
      context: ./enterprise/mcp-servers/mcp-wechat
    container_name: mcp-wechat
    ports:
      - "3001:3000"
    environment:
      - WECHAT_APP_ID=${WECHAT_APP_ID:-}
      - WECHAT_APP_SECRET=${WECHAT_APP_SECRET:-}
      - MCP_SERVER_PORT=3000
      - MCP_SERVER_PATH=/sse
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - dify-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# 统一网络（与 Dify 共享）
networks:
  dify-network:
    driver: bridge
    name: dify-network  # 固定名称，便于 Dify 和企业服务共享
