# ==================================================================
# Dify + Enterprise Agent Framework 统一编排
# ==================================================================
# 使用方式:
#   1. 克隆 Dify 官方仓库到 dify/ 目录（或独立部署）
#   2. 确保 Dify 使用网络 dify-network
#   3. 创建 secrets/ 目录并写入密钥文件（见下方 secrets 块说明）
#   4. 运行: docker compose up -d
#
# 密钥文件（不入 git，仅存在于服务器本地）:
#   secrets/wechat_app_secret.txt   — 微信公众号 AppSecret
#   secrets/dify_db_password.txt    — PostgreSQL 密码
# ==================================================================

secrets:
  wechat_app_secret:
    file: ./secrets/wechat_app_secret.txt
  dify_db_password:
    file: ./secrets/dify_db_password.txt
  feishu_app_secret:
    file: ./secrets/feishu_app_secret.txt
  dingtalk_app_secret:
    file: ./secrets/dingtalk_app_secret.txt

services:
  # ─── 企业自研: 配额管理服务 ───
  quota-manager:
    build:
      context: ./enterprise/quota-manager
    container_name: quota-manager
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PORT=3006
      - DIFY_BASE_URL=${DIFY_BASE_URL:-http://nginx/v1}
      - DIFY_CONSOLE_EMAIL=${DIFY_CONSOLE_EMAIL:-}
      - DIFY_CONSOLE_PASSWORD=${DIFY_CONSOLE_PASSWORD:-}
      - QUOTA_DB_HOST=${QUOTA_DB_HOST:-quota-db}
      - QUOTA_DB_PORT=5432
      - QUOTA_DB_USER=${QUOTA_DB_USER:-postgres}
      - QUOTA_DB_PASSWORD=${QUOTA_DB_PASSWORD:-changeme}
      - QUOTA_DB_NAME=enterprise
      - POLL_INTERVAL_SECONDS=${QUOTA_POLL_INTERVAL:-300}
      - JWT_SECRET=${JWT_SECRET:-changeme}
    networks:
      - dify-network
    depends_on:
      quota-db:
        condition: service_healthy
    profiles:
      - enterprise-plus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  quota-db:
    image: postgres:16-alpine
    container_name: quota-db
    environment:
      - POSTGRES_DB=enterprise
      - POSTGRES_USER=${QUOTA_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${QUOTA_DB_PASSWORD:-changeme}
    volumes:
      - quota_db_data:/var/lib/postgresql/data
    networks:
      - dify-network
    profiles:
      - enterprise-plus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${QUOTA_DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── 企业自研: SCIM 2.0 用户同步适配器 ───
  scim-adapter:
    build:
      context: ./enterprise/scim-adapter
    container_name: scim-adapter
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PORT=3007
      - DIFY_BASE_URL=${DIFY_BASE_URL:-http://nginx}
      - DIFY_CONSOLE_EMAIL=${DIFY_CONSOLE_EMAIL:-}
      - DIFY_CONSOLE_PASSWORD=${DIFY_CONSOLE_PASSWORD:-}
      - SCIM_BEARER_TOKEN=${SCIM_BEARER_TOKEN:-changeme}
      - SCIM_BASE_URL=${SCIM_BASE_URL:-http://localhost:3007}
    networks:
      - dify-network
    profiles:
      - enterprise-plus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── 企业自研: 跨工作区分析聚合服务 ───
  analytics-service:
    build:
      context: ./enterprise/analytics
    container_name: analytics-service
    ports:
      - "3008:3008"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PORT=3008
      - DIFY_BASE_URL=${DIFY_BASE_URL:-http://nginx}
      - DIFY_CONSOLE_EMAIL=${DIFY_CONSOLE_EMAIL:-}
      - DIFY_CONSOLE_PASSWORD=${DIFY_CONSOLE_PASSWORD:-}
      - ANALYTICS_POLL_INTERVAL_MINUTES=${ANALYTICS_POLL_INTERVAL_MINUTES:-15}
    networks:
      - dify-network
    profiles:
      - enterprise-plus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  # ─── 企业自研: 通用 Tool 服务 ───
  enterprise-tool-service:
    build:
      context: ./enterprise/tool-service
    container_name: enterprise-tool-service
    ports:
      - "3100:3000"
    environment:
      - SERVICE_PORT=3000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - dify-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── 企业自研: 微信公众号 MCP ───
  mcp-wechat:
    build:
      context: ./enterprise/mcp-servers/mcp-wechat
    container_name: mcp-wechat
    ports:
      - "3001:3000"
    secrets:
      - wechat_app_secret
    environment:
      - WECHAT_APP_ID=${WECHAT_APP_ID:-}
      # WECHAT_APP_SECRET 已移除 — 由 /run/secrets/wechat_app_secret 读取
      - MCP_SERVER_PORT=3000
      - MCP_SERVER_PATH=/sse
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - dify-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── 企业自研: 飞书 MCP ───
  mcp-feishu:
    build:
      context: ./enterprise/mcp-servers/mcp-feishu
    container_name: mcp-feishu
    ports:
      - "3003:3003"
    secrets:
      - feishu_app_secret
    environment:
      - PORT=3003
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - dify-network
    restart: unless-stopped
    profiles:
      - feishu
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── 企业自研: 钉钉 MCP ───
  mcp-dingtalk:
    build:
      context: ./enterprise/mcp-servers/mcp-dingtalk
    container_name: mcp-dingtalk
    ports:
      - "3004:3004"
    secrets:
      - dingtalk_app_secret
    environment:
      - PORT=3004
      - DINGTALK_APP_KEY=${DINGTALK_APP_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - dify-network
    restart: unless-stopped
    profiles:
      - dingtalk
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── 企业自研: 自定义 IM MCP ───
  mcp-custom-im:
    build:
      context: ./enterprise/mcp-servers/mcp-custom-im
    container_name: mcp-custom-im
    ports:
      - "3005:3005"
    volumes:
      # Mount your im-config.json at runtime (not baked into image)
      - ${IM_CONFIG_PATH:-./enterprise/mcp-servers/mcp-custom-im/im-config.json}:/app/im-config.json:ro
    environment:
      - PORT=3005
      - IM_CONFIG_PATH=/app/im-config.json
      # Fallback: single-webhook mode (used when im-config.json is absent)
      - IM_WEBHOOK_URL=${IM_WEBHOOK_URL:-}
      - IM_WEBHOOK_TOKEN=${IM_WEBHOOK_TOKEN:-}
      - IM_WEBHOOK_AUTH=${IM_WEBHOOK_AUTH:-none}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - dify-network
    restart: unless-stopped
    profiles:
      - custom-im
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── 企业自研: DevKit CLI 工具 ───
  devkit:
    build:
      context: ./enterprise/dev-kit
    container_name: dify-devkit
    volumes:
      - ./enterprise/components:/app/components:ro
      - ./enterprise/dev-kit/dify-dev.yaml:/app/dify-dev.yaml:ro
    environment:
      - DIFY_BASE_URL=${DIFY_BASE_URL:-http://nginx/v1}
      - DIFY_API_KEY=${DIFY_API_KEY:-}
      # DB 变量保留作为 adapter=db 的兜底（已弃用）
      - DIFY_DB_HOST=${DIFY_DB_HOST:-db_postgres}
      - DIFY_DB_PORT=${DIFY_DB_PORT:-5432}
      - DIFY_DB_USER=${DIFY_DB_USER:-postgres}
      - DIFY_DB_PASSWORD=${DIFY_DB_PASSWORD:-}
      - DIFY_DB_NAME=${DIFY_DB_NAME:-dify}
    networks:
      - dify-network
    profiles:
      - devkit
    command: ["status"]

volumes:
  quota_db_data:
    driver: local

# 统一网络（与 Dify 共享）
networks:
  dify-network:
    driver: bridge
    name: dify-network  # 固定名称，便于 Dify 和企业服务共享
