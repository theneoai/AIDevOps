version: "3.8"

services:
  enterprise-tool-service:
    build:
      context: ./enterprise/tool-service
    ports:
      - "3100:3000"
    environment:
      - SERVICE_PORT=3000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - dify-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mcp-wechat:
    build:
      context: ./enterprise/mcp-servers/mcp-wechat
    ports:
      - "3001:3000"
    environment:
      - WECHAT_APP_ID=${WECHAT_APP_ID:-}
      - WECHAT_APP_SECRET=${WECHAT_APP_SECRET:-}
      - MCP_SERVER_PORT=3000
      - MCP_SERVER_PATH=/sse
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - dify-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  dify-network:
    driver: bridge
