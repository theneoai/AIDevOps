global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'enterprise-tool-service'
    static_configs:
      - targets: ['enterprise-tool-service:3000']
    metrics_path: /metrics

  - job_name: 'mcp-wechat'
    static_configs:
      - targets: ['mcp-wechat:3000']
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
