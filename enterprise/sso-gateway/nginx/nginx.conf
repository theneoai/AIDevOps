# ============================================================
# Enterprise SSO Reverse Proxy
#
# Architecture:
#   Client → nginx → oauth2-proxy (validates OIDC/SAML token)
#                 → Dify (authenticated requests only)
#                 → Enterprise services (authenticated)
#
# oauth2-proxy injects X-Auth-User, X-Auth-Email, X-Auth-Groups
# headers after successful validation, which downstream services
# use for RBAC decisions.
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Preserve or generate a unique trace ID ────────────────
  # Use $trace_id (not $request_id) to avoid collision with nginx's built-in
  # $request_id variable (available since nginx 1.11.0).
  # If the client supplies X-Request-ID we forward it unchanged; otherwise
  # we fall through to nginx's own auto-generated $request_id.
  map $http_x_request_id $trace_id {
    default $http_x_request_id;
    ""      $request_id;
  }

  # ── Structured JSON access log for audit capture ──────────
  log_format audit_json escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"bytes":$body_bytes_sent,'
      '"referer":"$http_referer",'
      '"user_agent":"$http_user_agent",'
      '"trace_id":"$trace_id",'
      '"x_auth_user":"$http_x_auth_user",'
      '"x_auth_email":"$http_x_auth_email",'
      '"upstream_response_time":"$upstream_response_time",'
      '"upstream_addr":"$upstream_addr"'
    '}';

  access_log /var/log/nginx/access.log audit_json;

  sendfile        on;
  keepalive_timeout 65;
  client_max_body_size 100m;

  # ── Upstream: oauth2-proxy ─────────────────────────────────
  upstream oauth2_proxy {
    server oauth2-proxy:4180;
    keepalive 16;
  }

  # ── Upstream: Dify nginx (the official Dify reverse proxy) ─
  upstream dify_backend {
    server dify-nginx:80;
    keepalive 32;
  }

  # ── Upstream: Enterprise services ─────────────────────────
  upstream enterprise_tool_service {
    server enterprise-tool-service:3000;
    keepalive 8;
  }

  upstream quota_manager {
    server quota-manager:3006;
    keepalive 8;
  }

  upstream scim_adapter {
    server scim-adapter:3007;
    keepalive 8;
  }

  upstream analytics_service {
    server analytics-service:3008;
    keepalive 8;
  }

  # ── Main server block ──────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Request-ID $trace_id always;

    # ── OAuth2 proxy callback ──────────────────────────────
    location /oauth2/ {
      proxy_pass http://oauth2_proxy;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Scheme $scheme;
    }

    # ── Health check (no auth required) ───────────────────
    location /health {
      access_log off;
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }

    # ── SCIM 2.0 (IdP provisioning — uses Bearer token, not SSO cookie) ──
    location /scim/ {
      proxy_pass http://scim_adapter/scim/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID $trace_id;
    }

    # ── All other routes require SSO authentication ───────
    location / {
      # Validate session via oauth2-proxy
      auth_request /oauth2/auth;

      # On 401, redirect to IdP login
      error_page 401 = /oauth2/sign_in;

      # Forward auth headers from oauth2-proxy to upstream
      auth_request_set $auth_user   $upstream_http_x_auth_user;
      auth_request_set $auth_email  $upstream_http_x_auth_email;
      auth_request_set $auth_groups $upstream_http_x_auth_groups;

      proxy_set_header X-Auth-User   $auth_user;
      proxy_set_header X-Auth-Email  $auth_email;
      proxy_set_header X-Auth-Groups $auth_groups;
      proxy_set_header X-Request-ID  $trace_id;
      proxy_set_header Host          $host;
      proxy_set_header X-Real-IP     $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Route to Dify by default
      proxy_pass http://dify_backend;

      # WebSocket support (Dify uses SSE + WS)
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 300s;
      proxy_buffering off;
    }

    # ── Enterprise Tool Service ────────────────────────────
    location /enterprise/tools/ {
      auth_request /oauth2/auth;
      error_page 401 = /oauth2/sign_in;

      auth_request_set $auth_user   $upstream_http_x_auth_user;
      auth_request_set $auth_email  $upstream_http_x_auth_email;

      proxy_set_header X-Auth-User  $auth_user;
      proxy_set_header X-Auth-Email $auth_email;
      proxy_set_header X-Request-ID $trace_id;
      proxy_set_header Host         $host;

      proxy_pass http://enterprise_tool_service/;
    }

    # ── Quota Manager API (admin only, validated by service) ──
    location /enterprise/quotas/ {
      auth_request /oauth2/auth;
      error_page 401 = /oauth2/sign_in;

      auth_request_set $auth_user   $upstream_http_x_auth_user;
      auth_request_set $auth_email  $upstream_http_x_auth_email;
      auth_request_set $auth_groups $upstream_http_x_auth_groups;

      proxy_set_header X-Auth-User   $auth_user;
      proxy_set_header X-Auth-Email  $auth_email;
      proxy_set_header X-Auth-Groups $auth_groups;
      proxy_set_header X-Request-ID  $trace_id;
      proxy_set_header Host          $host;

      proxy_pass http://quota_manager/;
    }

    # ── Analytics API ──────────────────────────────────────
    location /enterprise/analytics/ {
      auth_request /oauth2/auth;
      error_page 401 = /oauth2/sign_in;

      auth_request_set $auth_user  $upstream_http_x_auth_user;
      auth_request_set $auth_email $upstream_http_x_auth_email;

      proxy_set_header X-Auth-User  $auth_user;
      proxy_set_header X-Auth-Email $auth_email;
      proxy_set_header X-Request-ID $trace_id;
      proxy_set_header Host         $host;

      proxy_pass http://analytics_service/;
    }
  }
}
