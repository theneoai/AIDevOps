# ============================================================
# oauth2-proxy Configuration
#
# Supports OIDC (Keycloak, Authentik, Okta, Azure AD, Google)
# and SAML 2.0 via upstream IdP.
#
# Usage:
#   Copy this file to oauth2-proxy.cfg, fill in your IdP values,
#   then run via docker-compose.sso.yml.
#
# Environment variable substitution: oauth2-proxy reads ${VAR}
# from the process environment, so secrets can stay out of this
# file via Docker Secrets or a .env file.
# ============================================================

# ── Provider ────────────────────────────────────────────────
# Common provider values:
#   oidc        — Generic OIDC (Keycloak, Authentik, Okta, Casdoor, etc.)
#   azure       — Azure Active Directory
#   google      — Google Workspace
#   github      — GitHub (for dev environments)
provider = "oidc"

# OIDC discovery URL — oauth2-proxy auto-fetches /.well-known/openid-configuration
# Keycloak:  http://keycloak:8080/realms/{realm}
# Authentik: http://authentik:9000/application/o/{slug}/
# Okta:      https://{domain}.okta.com/oauth2/default
oidc_issuer_url = "${SSO_OIDC_ISSUER_URL}"

# Client credentials (from IdP application registration)
client_id     = "${SSO_CLIENT_ID}"
client_secret = "${SSO_CLIENT_SECRET}"

# ── Cookie ──────────────────────────────────────────────────
# Must be 16, 24, or 32 bytes for AES encryption
cookie_secret = "${SSO_COOKIE_SECRET}"
cookie_name   = "_dify_enterprise_session"
cookie_secure = false  # set to true when TLS is terminated here
cookie_httponly = true
cookie_samesite = "lax"

# Session lifetime (matches IdP token TTL)
cookie_expire = "24h"
cookie_refresh = "1h"

# ── Binding ─────────────────────────────────────────────────
http_address  = "0.0.0.0:4180"
redirect_url  = "${SSO_REDIRECT_URL:-http://localhost/oauth2/callback}"

# ── Upstream — not used directly (nginx auth_request pattern) ─
# oauth2-proxy is called via sub-request only; actual proxying
# is handled by nginx so set upstream to a no-op sink.
upstreams = ["file:///dev/null"]

# ── Email/Group allowlisting ────────────────────────────────
# Restrict access to your company domain(s)
email_domains = ["${SSO_EMAIL_DOMAIN:-*}"]

# Optional: restrict to specific OIDC groups
# allowed_groups = ["dify-users", "dify-admins"]

# ── Claims → Headers ────────────────────────────────────────
# These become X-Auth-User / X-Auth-Email / X-Auth-Groups headers
# that nginx forwards to downstream services.
set_xauthrequest = true
pass_user_headers = true
pass_access_token = false

# ── OIDC scopes ─────────────────────────────────────────────
# "openid email profile" is the minimum; add "groups" if your IdP
# exposes group membership in the token.
scope = "openid email profile groups"

# ── Logging ─────────────────────────────────────────────────
silence_ping_logging = true
request_logging = true
standard_logging = true

# ── Skip authentication for internal paths ──────────────────
skip_auth_routes = [
  "^/health$",
  "^/oauth2/",
  "^/scim/"
]

# ── TLS (when terminating TLS directly at oauth2-proxy) ─────
# tls_cert_file = "/etc/ssl/certs/server.crt"
# tls_key_file  = "/etc/ssl/private/server.key"
